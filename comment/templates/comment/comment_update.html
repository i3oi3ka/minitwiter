{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">

            <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                <div
                    class="card-header bg-white border-0 pt-4 pb-0 px-4 d-flex justify-content-between align-items-center">
                    <h3 class="fw-bold mb-0">✏️ Редагувати коментар</h3>
                    <a href="{% url 'comment_delete' comment.pk %}"
                        class="btn btn-outline-danger btn-sm rounded-pill px-3">
                        Видалити
                    </a>
                </div>

                <div class="card-body p-4">
                    {% if user == comment.user %}
                    <form method="post" enctype="multipart/form-data" class="styled-comment-form" novalidate>
                        {% csrf_token %}

                        <div class="form-fields">
                            {{ form.as_p }}
                        </div>

                        <div class="d-flex justify-content-end mt-4 pt-3 border-top gap-2">
                            <a href="javascript:history.back()" class="btn btn-light rounded-pill fw-bold px-4">
                                Скасувати
                            </a>
                            <button type="submit" class="btn btn-primary rounded-pill fw-bold px-4 shadow-sm">
                                Зберегти зміни
                            </button>
                        </div>
                    </form>
                    {% else %}
                    <div class="text-center py-5">
                        <span class="display-1 d-block mb-3">🚫</span>
                        <h4 class="fw-bold text-danger">Доступ заборонено</h4>
                        <p class="text-muted">Ви не можете редагувати цей коментар, оскільки не є його автором.</p>
                        <a href="{% url 'posts_list' %}" class="btn btn-primary rounded-pill px-4">До стрічки</a>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Стилізація полів форми коментаря */
    .styled-comment-form p label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #495057;
    }

    .styled-comment-form textarea,
    .styled-comment-form input[type="text"] {
        display: block;
        width: 100%;
        padding: 0.8rem 1rem;
        font-size: 1rem;
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 1rem;
        /* Більш закруглені кути для коментарів */
        margin-bottom: 1rem;
        transition: all 0.2s;
    }

    .styled-comment-form textarea:focus {
        background-color: #fff;
        border-color: #0d6efd;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
    }

    .styled-comment-form textarea {
        min-height: 150px;
    }

    .styled-comment-form p {
        margin-bottom: 0;
    }
</style>
{% endblock %}
